<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entraînement : Opérations Posées Décimales (6ème)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcfcf4;
            color: #2c3e50;
            max-width: 750px;
            margin: 40px auto;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            background: white;
        }
        h1 {
            color: #16a085;
            text-align: center;
            border-bottom: 2px solid #1abc9c;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .step-panel {
            display: none;
        }
        .step-panel.active {
            display: block;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 1.1em;
            border: 2px solid #bdc3c7;
            border-radius: 4px;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        input[type="text"]:focus {
            border-color: #1abc9c;
        }
        .consigne {
            font-size: 1.2em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        
        .operation-container {
            display: flex;
            justify-content: center;
            margin: 25px 0;
        }

        .operation-standard {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.4em;
            font-weight: bold;
            line-height: 1.2;
            text-align: right;
            display: inline-block;
            padding: 10px 20px;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #e9ecef;
            letter-spacing: 2px;
        }
        .barre-calcul {
            border: none;
            border-top: 3px solid #2c3e50;
            margin: 5px 0 0 0;
            padding: 0;
        }

        .potence-division {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.4em;
            font-weight: bold;
            border-collapse: collapse;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }
        .potence-division td {
            padding: 10px 25px;
            text-align: center;
            border: none;
        }
        .td-dividend {
            text-align: right !important;
            padding-right: 20px !important;
        }
        .td-divisor {
            border-left: 4px solid #2c3e50 !important;
            text-align: left !important;
            padding-left: 20px !important;
        }
        .td-quotient {
            border-left: 4px solid #2c3e50 !important;
            border-top: 4px solid #2c3e50 !important;
            text-align: left !important;
            padding-left: 20px !important;
            color: #7f8c8d;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button.action-btn {
            flex: 1;
            padding: 14px;
            font-size: 1em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-start { background-color: #16a085; color: white; width: 100%; padding: 14px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1em;}
        .btn-start:hover { background-color: #117a65; }
        .btn-submit { background-color: #2ecc71; color: white; }
        .btn-submit:hover { background-color: #27ae60; }
        .btn-skip { background-color: #7f8c8d; color: white; }
        .btn-skip:hover { background-color: #6c7a7d; }
        
        .progress-bar {
            background-color: #e0e0e0;
            border-radius: 4px;
            height: 8px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            background-color: #1abc9c;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .indicator {
            text-align: right;
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 15px;
        }
        .result-box {
            background: #fdfdfd;
            padding: 20px;
            border-radius: 6px;
            border-left: 5px solid #16a085;
            margin-top: 20px;
            text-align: center;
        }
        .result-box h2 { margin-top: 0; color: #2c3e50; }
        
        table.bilan {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.95em;
        }
        table.bilan th, table.bilan td {
            border: 1px solid #dcdde1;
            padding: 10px;
            text-align: left;
        }
        table.bilan th {
            background-color: #f5f6fa;
            color: #353b48;
        }
        .row-correct { background-color: #d4edda; color: #155724; }
        .row-incorrect { background-color: #f8d7da; color: #721c24; }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            font-weight: bold;
            border-radius: 4px;
            font-size: 0.85em;
        }
        .badge-success { background-color: #2ecc71; color: white; }
        .badge-danger { background-color: #e74c3c; color: white; }
    </style>
</head>
<body>

    <h1>Calcul Posé Décimal (6ème)</h1>

    <div id="panel-login" class="step-panel active">
        <label for="student-name">Entrez votre nom et votre prénom :</label>
        <div style="margin-bottom: 15px;">
            <input type="text" id="student-name" placeholder="Ex: Lucas Simon">
        </div>
        <button class="btn-start" onclick="startTest()">Commencer l'évaluation</button>
    </div>

    <div id="panel-quiz" class="step-panel">
        <div class="indicator">Question <span id="current-q">1</span> / 5</div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        
        <div class="consigne" id="q-consigne">Effectue l'opération posée :</div>
        
        <div class="operation-container" id="q-operation-container"></div>
        
        <div>
            <label for="user-answer">Réponse (utilise la virgule ',' ou le point '.') :</label>
            <input type="text" id="user-answer" placeholder="Inscris la troncature au centième" autocomplete="off">
        </div>
        
        <div class="btn-group">
            <button class="action-btn btn-skip" onclick="skipQuestion()">Passer</button>
            <button class="action-btn btn-submit" onclick="submitAnswer()">Valider la réponse</button>
        </div>
    </div>

    <div id="panel-results" class="step-panel">
        <div class="result-box">
            <h2>Résultats de l'évaluation</h2>
            <p><strong>Élève :</strong> <span id="res-name">...</span></p>
            <p><strong>Note :</strong> <span id="res-grade" style="font-size: 2.2em; color: #27ae60; font-weight: bold;">0 / 5</span></p>
        </div>

        <h3 style="margin-top:25px; color:#2c3e50; border-bottom:2px solid #bdc3c7; padding-bottom:5px;">Correction détaillée</h3>
        <table class="bilan">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Opération</th>
                    <th>Ta réponse</th>
                    <th>Correction</th>
                </tr>
            </thead>
            <tbody id="bilan-table-body">
            </tbody>
        </table>

        <button class="btn-start" style="margin-top: 30px;" onclick="location.reload()">Refaire une autre série</button>
    </div>

    <script>
        let quizQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let studentName = "";

        function generateDecimalStandardHTML(num1, num2, operator) {
            const s1 = num1.toFixed(2).replace('.', ',');
            const s2 = num2.toFixed(2).replace('.', ',');
            
            const p1 = s1.split(',');
            const p2 = s2.split(',');

            const maxLeft = Math.max(p1[0].length, p2[0].length + 2);

            const line1 = p1[0].padStart(maxLeft, ' ') + ',' + p1[1];
            const line2 = (operator + ' ' + p2[0]).padStart(maxLeft, ' ') + ',' + p2[1];
            
            return `<div class="operation-standard">${line1}<br>${line2}<hr class="barre-calcul"></div>`;
        }

        function generateDivisionHTML(dividend, divisor) {
            const displayDividend = dividend.toString().replace('.', ',');
            const displayDivisor = divisor.toString().replace('.', ',');
            return `
                <table class="potence-division">
                    <tr>
                        <td class="td-dividend">${displayDividend}</td>
                        <td class="td-divisor">${displayDivisor}</td>
                    </tr>
                    <tr>
                        <td style="color: transparent;">...</td>
                        <td class="td-quotient">?,??</td>
                    </tr>
                </table>
            `;
        }

        function buildQuiz() {
            quizQuestions = [];
            
            const generators = [
                // 1. ADDITION DÉCIMALE (>= 4 chiffres)
                () => {
                    const n1 = Math.floor(Math.random() * (95000 - 15000) + 15000) / 100;
                    const n2 = Math.floor(Math.random() * (85000 - 12000) + 12000) / 100;
                    const exact = (n1 + n2).toFixed(2);
                    return {
                        type: "Addition décimale",
                        htmlContent: generateDecimalStandardHTML(n1, n2, "+"),
                        flatExpr: `${n1.toString().replace('.', ',')} + ${n2.toString().replace('.', ',')}`,
                        check: (user) => parseFloat(user.replace(',', '.')) === parseFloat(exact),
                        correctDisplay: exact.replace('.', ',')
                    };
                },
                // 2. SOUSTRACTION DÉCIMALE (>= 4 chiffres)
                () => {
                    const n1 = Math.floor(Math.random() * (95000 - 50000) + 50000) / 100;
                    const n2 = Math.floor(Math.random() * (45000 - 11000) + 11000) / 100;
                    const exact = (n1 - n2).toFixed(2);
                    return {
                        type: "Soustraction décimale",
                        htmlContent: generateDecimalStandardHTML(n1, n2, "-"),
                        flatExpr: `${n1.toString().replace('.', ',')} - ${n2.toString().replace('.', ',')}`,
                        check: (user) => parseFloat(user.replace(',', '.')) === parseFloat(exact),
                        correctDisplay: exact.replace('.', ',')
                    };
                },
                // 3. MULTIPLICATION DÉCIMALE
                () => {
                    const n1 = Math.floor(Math.random() * (650 - 120) + 120) / 10;
                    const n2 = Math.floor(Math.random() * (9 - 3) + 3);
                    const exact = (n1 * n2).toFixed(2);
                    
                    const s1 = n1.toFixed(1).replace('.', ',');
                    const s2 = "× " + n2;
                    const maxLength = Math.max(s1.length, s2.length);
                    const html = `<div class="operation-standard">${s1.padStart(maxLength, ' ')}<br>${s2.padStart(maxLength, ' ')}<hr class="barre-calcul"></div>`;

                    return {
                        type: "Multiplication décimale",
                        htmlContent: html,
                        flatExpr: `${n1.toString().replace('.', ',')} × ${n2}`,
                        check: (user) => parseFloat(user.replace(',', '.')) === parseFloat(exact),
                        correctDisplay: parseFloat(exact).toString().replace('.', ',')
                    };
                },
                // 4. DIVISION DÉCIMALE (Avec troncature au centième et reste non nul)
                () => {
                    const divisor = [3, 6, 7, 1.1, 1.3, 2.3][Math.floor(Math.random() * 6)];
                    const targetQuotient = Math.floor(Math.random() * (2500 - 1100) + 1100) / 100;
                    
                    // On pousse volontairement le dividende pour générer des millièmes
                    // afin de forcer une vraie troncature (le chiffre des millièmes n'influencera pas le résultat)
                    let dividend = parseFloat((divisor * targetQuotient).toFixed(2));
                    // Ajout d'un résidu garantissant que le chiffre des millièmes est grand (ex: 7 ou 8)
                    dividend = parseFloat((dividend + (divisor * 0.0075)).toFixed(4));

                    // Calcul de la troncature stricte au centième
                    // Math.floor(val * 100) / 100 évite toute forme d'arrondi supérieur
                    const rawQuotient = dividend / divisor;
                    const exactTrunc = (Math.floor(Number(rawQuotient.toFixed(6)) * 100) / 100).toFixed(2);

                    return {
                        type: "Division décimale",
                        htmlContent: generateDivisionHTML(dividend, divisor),
                        flatExpr: `${dividend.toString().replace('.', ',')} ÷ ${divisor.toString().replace('.', ',')}`,
                        // Validation : on compare sous forme de chaîne formatée au centième
                        check: (user) => {
                            const val = parseFloat(user.replace(',', '.'));
                            return !isNaN(val) && val.toFixed(2) === exactTrunc;
                        },
                        correctDisplay: exactTrunc.replace('.', ',')
                    };
                }
            ];

            let chosen = [...generators];
            chosen.push(generators[Math.floor(Math.random() * generators.length)]);
            chosen = chosen.sort(() => 0.5 - Math.random());

            for (let i = 0; i < 5; i++) {
                quizQuestions.push(chosen[i]());
            }
        }

        function startTest() {
            const nameInput = document.getElementById("student-name").value.trim();
            if (nameInput === "") {
                alert("Veuillez entrer votre nom.");
                return;
            }
            studentName = nameInput;
            buildQuiz();
            showPanel("panel-quiz");
            loadQuestion();
        }

        function showPanel(panelId) {
            document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
        }

        function loadQuestion() {
            if (currentIndex >= 5) {
                endTest();
                return;
            }

            const q = quizQuestions[currentIndex];
            document.getElementById("current-q").innerText = currentIndex + 1;
            document.getElementById("q-operation-container").innerHTML = q.htmlContent;
            
            if (q.type === "Division décimale") {
                document.getElementById("q-consigne").innerText = "Calcule la valeur approchée du quotient par troncature au centième (arrête-toi à 2 chiffres après la virgule sans arrondir) :";
            } else {
                document.getElementById("q-consigne").innerText = "Effectue l'opération décimale posée suivante :";
            }
            
            document.getElementById("user-answer").value = "";
            document.getElementById("user-answer").focus();
            
            const progress = (currentIndex / 5) * 100;
            document.getElementById("progress-fill").style.width = progress + "%";
        }

        function submitAnswer() {
            const q = quizQuestions[currentIndex];
            const uAns = document.getElementById("user-answer").value.trim();
            
            if (uAns === "") {
                alert("Veuillez inscrire un résultat.");
                return;
            }

            q.savedAns = uAns.replace('.', ',');
            const isCorrect = q.check(uAns);

            if (isCorrect) {
                score++;
                q.isCorrect = true;
            } else {
                q.isCorrect = false;
            }

            currentIndex++;
            loadQuestion();
        }

        function skipQuestion() {
            const q = quizQuestions[currentIndex];
            q.isCorrect = false;
            q.savedAns = "Passée";
            currentIndex++;
            loadQuestion();
        }

        function endTest() {
            showPanel("panel-results");
            document.getElementById("res-name").innerText = studentName;
            document.getElementById("res-grade").innerText = `${score} / 5`;
            
            if (score >= 4) document.getElementById("res-grade").style.color = "#2ecc71";
            else if (score >= 2.5) document.getElementById("res-grade").style.color = "#e67e22";
            else document.getElementById("res-grade").style.color = "#e74c3c";

            const tableBody = document.getElementById("bilan-table-body");
            tableBody.innerHTML = ""; 

            quizQuestions.forEach(q => {
                const row = document.createElement("tr");
                row.className = q.isCorrect ? "row-correct" : "row-incorrect";

                row.innerHTML = `
                    <td><strong>${q.type}</strong></td>
                    <td style="font-family:monospace; font-size:1.1em;">${q.flatExpr}</td>
                    <td>${q.savedAns}</td>
                    <td>${q.isCorrect ? '<span class="badge badge-success">Juste !</span>' : `<span class="badge badge-danger">Attendu : ${q.correctDisplay}</span>`}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        document.getElementById("user-answer").addEventListener("keyup", function(event) {
            if (event.key === "Enter") submitAnswer();
        });
    </script>
</body>
</html>
